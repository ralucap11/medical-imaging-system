<div class="upload-container">
  <h3>Upload Radiografie</h3>

  <div class="file-input-wrapper">
    <input
      type="file"
      accept=".jpg,.jpeg,.png,.dcm"
      (change)="onFileSelected($event)"
    />
  </div>

  <button (click)="upload()" [disabled]="!selectedFile() || isUploading()">
    {{ isUploading() ? 'Se încarcă...' : 'Încarcă radiografia' }}
  </button>

  @if (selectedFile()) {
  <span>{{ selectedFile()!.name }}</span>
  }

  @if (uploadResult()) {
  <div class="success">
    ✅ Radiografia a fost încărcată cu succes!
    <small>Fișier: {{ uploadResult()!.fileName }}</small>
  </div>
  }

  @if (errorMessage()) {
  <div class="error">❌ {{ errorMessage() }}</div>
  }
</div>
