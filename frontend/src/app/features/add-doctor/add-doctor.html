<h2 mat-dialog-title>Adaugă doctor</h2>
<mat-dialog-content [formGroup]="form">
  @if (error) {
  <p class="dialog-error">❌ {{ error }}</p>
  }

  <div class="form-row">
    <div class="form-group">
      <label>Prenume</label>
      <input type="text" formControlName="firstName" />
    </div>
    <div class="form-group">
      <label>Nume</label>
      <input type="text" formControlName="lastName" />
    </div>
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" formControlName="email" />
    @if (form.get('email')?.hasError('email') && form.get('email')?.touched) {
    <span class="error-msg">Email invalid</span>
    }
  </div>

  <div class="form-group">
    <label>Parolă</label>
    <input type="password" formControlName="password" />
    @if (form.get('password')?.hasError('minlength') && form.get('password')?.touched) {
    <span class="error-msg">Minim 6 caractere</span>
    }
  </div>

  <div class="form-group">
    <label>Specialitate</label>
    <input type="text" formControlName="specialty" />
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Anulează</button>
  <button mat-flat-button color="primary"
          (click)="submit()"
          [disabled]="form.invalid || isLoading">
    {{ isLoading ? 'Se salvează...' : 'Adaugă' }}
  </button>
</mat-dialog-actions>
