<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Înregistrare</h2>
    <div class="error-msg"   *ngIf="error">{{ error }}</div>
    <div class="success-msg" *ngIf="success">{{ success }}</div>
    <form (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Prenume</label>
        <input
          type="text"
          [(ngModel)]="form.firstName"
          name="firstName"
          placeholder="Prenume"
          required />
      </div>
      <div class="field">
        <label>Nume</label>
        <input
          type="text"
          [(ngModel)]="form.lastName"
          name="lastName"
          placeholder="Nume"
          required />
      </div>
      <div class="field">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="form.email"
          name="email"
          placeholder="adresa@email.com"
          required />
      </div>
      <div class="field">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="form.password"
          name="password"
          placeholder="Minimum 8 characters"
          required />
      </div>
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Se încarcă...' : 'Creare cont' }}
      </button>
    </form>
    <p class="switch-link">
      Already have an account?
      <a routerLink="/auth/login">Login</a>
    </p>
  </div>
</div>e
