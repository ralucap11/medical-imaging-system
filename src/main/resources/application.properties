spring.application.name=medical-imaging-system
spring.datasource.url=jdbc:h2:mem:medicalimagingsystem;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=medic
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

xray.storage.path=uploads/xrays

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB