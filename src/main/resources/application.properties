spring.application.name=medical-imaging-system

spring.datasource.url=jdbc:postgresql://localhost:5432/medical_imaging
spring.datasource.username=medical_user
spring.datasource.password=parola123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

xray.storage.path=uploads/xrays
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

frontend.url=${FRONTEND_URL}

ai.service.url=${AI_URL}
ai.service.cobb.url=${AI_COBB_URL}